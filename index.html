<!DOCTYPE html>
<html>
<head>
    <title>Store</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <!-- AdminLTE -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
    
    <style>
    body {
      background-color: #f8f9fa;
    }

    /* Card style */
    .card {
      border: none;
      box-shadow: none;
    }

    /* App card sizing */
    .app-card {
      min-width: 110px;
      max-width: 130px;
      flex-shrink: 0;
    }

    /* Image */
    .card img {
      border-radius: 16px;
    }

    /* Title */
    .app-title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.2;
    }

    /* Hide scrollbar (mobile feel) */
    .d-flex.overflow-auto::-webkit-scrollbar {
      display: none;
    }

    /* Smooth scroll */
    .d-flex.overflow-auto {
      -webkit-overflow-scrolling: touch;
    }

    /* Desktop tweaks */
    @media (min-width: 768px) {
      .app-card {
        min-width: 140px;
      }
    }
    </style>
</head>

<body class="hold-transition layout-top-nav">
<div class="wrapper">

  <!-- Navbar -->
  <nav class="main-header navbar navbar-expand navbar-white navbar-light px-2">
    <a href="#" class="navbar-brand"><b>My</b>Play</a>

    <form class="form-inline ml-2 flex-grow-1">
      <input class="form-control w-100" type="search" placeholder="Search apps & games">
    </form>
  </nav>

  <!-- Content -->
  <div class="content-wrapper p-2 p-md-3">
    <div class="container-fluid">

      <!-- Categories -->
      <div class="mb-3 d-flex overflow-auto">
        <button class="btn btn-light btn-sm mr-2">For you</button>
        <button class="btn btn-light btn-sm mr-2">Top charts</button>
        <button class="btn btn-light btn-sm mr-2">Categories</button>
      </div>

      <!-- Section -->
      <h6 class="mb-2">Recommended for you</h6>

      <div class="d-flex overflow-auto pb-3">

        <!-- App Card -->
        <div class="card mr-2 app-card">
          <img src="https://via.placeholder.com/120" class="card-img-top">
          <div class="card-body p-2">
            <div class="app-title">WhatsApp</div>
            <div class="text-muted small">Meta</div>
            <div class="small">⭐ 4.3</div>
          </div>
        </div>

        <div class="card mr-2 app-card">
          <img src="https://via.placeholder.com/120" class="card-img-top">
          <div class="card-body p-2">
            <div class="app-title">Spotify</div>
            <div class="text-muted small">Spotify Ltd.</div>
            <div class="small">⭐ 4.5</div>
          </div>
        </div>

      </div>

      <!-- Grid Section -->
      <h6 class="mt-3 mb-2">Popular apps</h6>

      <div class="row">
        <div class="col-4 col-sm-3 col-md-2 mb-3">
          <div class="card app-card">
            <img src="https://via.placeholder.com/120" class="card-img-top">
            <div class="card-body p-2 text-center">
              <div class="app-title">Instagram</div>
              <div class="small">⭐ 4.4</div>
            </div>
          </div>
        </div>

        <!-- duplicate more -->
      </div>

    </div>
  </div>

</div>
</body>
</html>
