<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <!-- AdminLTE -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
    
    <style>
        body {
        background-color: #f8f9fa;
        }

        .card {
        border: none;
        box-shadow: none;
        }

        .card img {
        border-radius: 20px;
        }

        .d-flex.overflow-auto::-webkit-scrollbar {
        display: none;
        }
    </style>
</head>

<body class="hold-transition layout-top-nav">
<div class="wrapper">

  <!-- Navbar -->
  <nav class="main-header navbar navbar-expand navbar-white navbar-light">
    <a href="#" class="navbar-brand"><b>My</b>Play</a>

    <form class="form-inline ml-3" style="width: 400px;">
      <input class="form-control w-100" type="search" placeholder="Search apps & games">
    </form>
  </nav>

  <!-- Content -->
  <div class="content-wrapper p-3">
    <div class="container-fluid">

      <!-- Categories -->
      <div class="mb-3 d-flex gap-3">
        <button class="btn btn-light btn-sm">For you</button>
        <button class="btn btn-light btn-sm">Top charts</button>
        <button class="btn btn-light btn-sm">Categories</button>
      </div>

      <!-- Section -->
      <h5 class="mb-3">Recommended for you</h5>

      <div class="d-flex overflow-auto pb-3">

        <!-- App Card -->
        <div class="card mr-3" style="min-width:140px;">
          <img src="https://via.placeholder.com/120" class="card-img-top rounded">
          <div class="card-body p-2">
            <small class="font-weight-bold">WhatsApp</small><br>
            <small class="text-muted">Meta</small><br>
            <small>⭐ 4.3</small>
          </div>
        </div>

        <!-- Repeat -->
        <div class="card mr-3" style="min-width:140px;">
          <img src="https://via.placeholder.com/120" class="card-img-top rounded">
          <div class="card-body p-2">
            <small class="font-weight-bold">Spotify</small><br>
            <small class="text-muted">Spotify Ltd.</small><br>
            <small>⭐ 4.5</small>
          </div>
        </div>

      </div>

      <!-- Another Section -->
      <h5 class="mt-4 mb-3">Popular apps</h5>

      <div class="row">
        <div class="col-md-2">
          <div class="card">
            <img src="https://via.placeholder.com/120" class="card-img-top">
            <div class="card-body p-2">
              <small class="font-weight-bold">Instagram</small><br>
              <small>⭐ 4.4</small>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

</div>
</body>
</html>
