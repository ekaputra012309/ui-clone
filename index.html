<!DOCTYPE html>
<html>
  <head>
    <title>MyPlay Store</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Bootstrap -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
    />

    <!-- AdminLTE -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css"
    />

    <!-- SQL.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.13.0/sql-wasm.js"></script>

    <link rel="stylesheet" href="./assets/style.css" />
  </head>

  <body class="hold-transition layout-top-nav">
    <div class="wrapper">
      <!-- NAVBAR -->
      <nav class="main-header navbar navbar-white navbar-light px-2">
        <a href="./index.html" class="navbar-brand"><b>My</b>Play</a>

        <input
          id="searchInput"
          class="form-control ml-2 w-50"
          placeholder="Search Apps"
        />
      </nav>

      <!-- CONTENT -->
      <div class="content-wrapper">
        <div class="container-fluid px-lg-5">
          <!-- CATEGORY -->
          <div class="mb-3 mt-2 d-flex overflow-auto">
            <button class="chip active mr-2 all" data-filter="all">All</button>
            <button class="chip mr-2 android" data-filter="android">
              Android
            </button>
            <button class="chip mr-2 windows" data-filter="windows">
              Windows
            </button>
          </div>

          <!-- APP LIST -->
          <div id="appList" class="app-grid"></div>
        </div>
      </div>
    </div>

    <!-- SQL DB + APP JS -->
    <script src="./assets/app.js"></script>
  </body>
</html>
