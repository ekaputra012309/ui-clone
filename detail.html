<!DOCTYPE html>
<html>
  <head>
    <title>App Detail</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Bootstrap -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
    />

    <!-- SQL.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.13.0/sql-wasm.js"></script>

    <link rel="stylesheet" href="./assets/detail.css" />
  </head>

  <body>
    <!-- NAVBAR -->
    <nav
      class="main-header navbar navbar-expand navbar-white navbar-light px-2"
    >
      <a href="./index.html" class="navbar-brand"><b>My</b>Play</a>
    </nav>

    <div class="container py-4">
      <!-- HEADER (DYNAMIC) -->
      <div class="app-header d-flex align-items-center">
        <img id="appIcon" class="app-icon mr-3" />

        <div class="flex-grow-1">
          <h4 id="appName" class="mb-1"></h4>

          <div id="appMeta" class="mb-1 text-muted"></div>

          <div id="platformBadges" class="mb-2"></div>

          <div>
            <i class="fas fa-star text-warning"></i>
            <span id="appRating"></span>
          </div>
        </div>

        <div class="install-actions d-md-flex flex-wrap">
          <a href="#" class="store-btn android-btn">
            <i class="fab fa-android"></i> Android
          </a>

          <a href="#" class="store-btn windows-btn">
            <i class="fab fa-windows"></i> Windows
          </a>
        </div>
      </div>

      <!-- TAB -->
      <div class="tab-bar mt-3">
        <div class="tab-btn active" data-tab="about">About</div>
        <div class="tab-btn" data-tab="reviews">Reviews</div>
        <div class="tab-btn" data-tab="updates">Updates</div>
      </div>

      <!-- ABOUT -->
      <div id="about" class="tab-content-box">
        <h5>Description</h5>
        <p id="appDesc" class="text-muted"></p>

        <h5 class="mt-4">Screenshots</h5>

        <div class="screenshots-container position-relative mt-2">
          <!-- LEFT BUTTON (desktop only) -->
          <button
            class="scroll-btn left d-none d-md-flex"
            onclick="scrollScreenshots(-1)"
          >
            <i class="fas fa-chevron-left text-muted"></i>
          </button>

          <!-- SCROLL AREA -->
          <div
            id="screenshots"
            class="screenshots-wrapper d-flex overflow-auto"
          ></div>

          <!-- RIGHT BUTTON (desktop only) -->
          <button
            class="scroll-btn right d-none d-md-flex"
            onclick="scrollScreenshots(1)"
          >
            <i class="fas fa-chevron-right text-muted"></i>
          </button>
        </div>
      </div>

      <!-- REVIEWS -->
      <div id="reviews" class="tab-content-box hidden"></div>

      <!-- UPDATES -->
      <div id="updates" class="tab-content-box hidden"></div>
    </div>

    <!-- IMAGE VIEWER -->
    <div id="imageViewer" class="image-viewer hidden">
      <span class="viewer-close">&times;</span>

      <button class="viewer-nav viewer-prev">
        <i class="fas fa-chevron-left"></i>
      </button>

      <img id="viewerImage" class="viewer-image" />

      <button class="viewer-nav viewer-next">
        <i class="fas fa-chevron-right"></i>
      </button>
    </div>

    <!-- MOBILE STICKY DOWNLOAD BAR -->
    <div id="mobileDownloadBar" class="mobile-download-bar"></div>

    <script src="./assets/detail.js"></script>
  </body>
</html>
